name: Repackage Dify Plugin from Gitee

on:
  workflow_dispatch:
    inputs:
      gitee_repo:
        description: "Gitee 仓库地址（如：https://gitee.com/yourname/dify-plugin-database）"
        required: true
        type: string
      plugin_version:
        description: "插件版本号（如：0.0.11，留空则拉取最新代码）"
        required: false
        type: string
      platform_arm:
        description: "Use ARM platform (true = manylinux_2_17_aarch64, false = manylinux_2_17_x86_64)"
        required: true
        default: "false"

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow inputs
        run: |
          echo "gitee_repo     = ${{ inputs.gitee_repo }}"
          echo "plugin_version = ${{ inputs.plugin_version }}"
          echo "platform_arm   = ${{ inputs.platform_arm }}"

      - name: Resolve platform
        run: |
          if [ "${{ inputs.platform_arm }}" = "true" ]; then
            echo "PIP_PLATFORM=manylinux_2_17_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-arm" >> "$GITHUB_ENV"
          else
            echo "PIP_PLATFORM=manylinux_2_17_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline" >> "$GITHUB_ENV"
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone plugin repo from Gitee
        run: |
          REPO_URL="${{ inputs.gitee_repo }}"
          
          # 处理 Gitee URL，支持带 .git 和不带的
          if [[ ! "$REPO_URL" == *.git ]]; then
            REPO_URL="${REPO_URL}.git"
          fi
          
          # 克隆仓库
          if [ -n "${{ inputs.plugin_version }}" ]; then
            # 如果指定了版本号，克隆对应 tag 或 branch
            git clone --depth 1 --branch "${{ inputs.plugin_version }}" "$REPO_URL" plugin-source
          else
            # 否则克隆最新代码
            git clone --depth 1 "$REPO_URL" plugin-source
          fi
          
          if [ $? -ne 0 ]; then
            echo "❌ 克隆仓库失败！请检查仓库地址和版本号是否正确"
            exit 1
          fi
          
          echo "✅ 成功克隆仓库到 plugin-source 目录"
          ls -la plugin-source/

      - name: Check plugin structure
        run: |
          cd plugin-source
          
          # 检查必要文件是否存在
          if [ ! -f "manifest.yaml" ]; then
            echo "❌ 缺少 manifest.yaml 文件，这不是一个合法的 Dify 插件"
            exit 1
          fi
          
          # 从 manifest.yaml 读取插件信息（如果用户没传的话）
          if [ -z "$PLUGIN_AUTHOR" ]; then
            PLUGIN_AUTHOR=$(grep -E "^author:" manifest.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
            echo "从 manifest.yaml 读取到 author: $PLUGIN_AUTHOR"
          fi
          
          if [ -z "$PLUGIN_NAME" ]; then
            PLUGIN_NAME=$(grep -E "^name:" manifest.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
            echo "从 manifest.yaml 读取到 name: $PLUGIN_NAME"
          fi
          
          if [ -z "$PLUGIN_VERSION" ]; then
            PLUGIN_VERSION=$(grep -E "^version:" manifest.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
            echo "从 manifest.yaml 读取到 version: $PLUGIN_VERSION"
          fi
          
          echo "PLUGIN_AUTHOR=$PLUGIN_AUTHOR" >> $GITHUB_ENV
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> $GITHUB_ENV

      - name: Make plugin_repackaging.sh executable
        run: |
          # 检查 plugin_repackaging.sh 是否存在，不存在则从 GitHub 下载
          if [ ! -f "./plugin_repackaging.sh" ]; then
            echo "下载 plugin_repackaging.sh 脚本..."
            curl -O https://raw.githubusercontent.com/junjiem/dify-plugin-repackaging/main/plugin_repackaging.sh
          fi
          chmod +x ./plugin_repackaging.sh

      - name: Run plugin repackaging script
        run: |
          # 使用本地目录模式打包
          PIP_MIRROR_URL=https://pypi.org/simple \
          ./plugin_repackaging.sh \
          -p ${{ env.PIP_PLATFORM }} \
          -s ${{ env.PACKAGE_SUFFIX }} \
          local \
          ./plugin-source

      - name: Find repackaged artifact
        run: |
          ARTIFACT_PATH=$(find . -type f -name "*-${PACKAGE_SUFFIX}.difypkg" | head -n 1)
          if [ -z "$ARTIFACT_PATH" ]; then
            echo "❌ 没有找到 *-${PACKAGE_SUFFIX}.difypkg 打包文件"
            exit 1
          fi
          
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")" >> $GITHUB_ENV
          echo "✅ 打包完成: $ARTIFACT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

name: 从 Gitee Release 拉取插件并打包为离线包 

on:
  workflow_dispatch:
    inputs:
      gitee_repo:
        description: "Gitee 仓库地址（如：strakMan/dify-plugin-database）"
        required: true
        type: string
      plugin_version:
        description: "插件版本号（如：0.0.11）"
        required: true
        type: string
      platform_arm:
        description: "Use ARM platform (true = aarch64, false = x86_64)"
        required: true
        default: "false"
        type: string

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: 打印输入参数
        run: |
          echo "Gitee 仓库: ${{ inputs.gitee_repo }}"
          echo "版本号: ${{ inputs.plugin_version }}"
          echo "ARM 平台: ${{ inputs.platform_arm }}"

      - name: 解析平台架构
        run: |
          if [ "${{ inputs.platform_arm }}" = "true" ]; then
            echo "PIP_PLATFORM=manylinux_2_17_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-arm" >> "$GITHUB_ENV"
            echo "CLI_ARCH=arm64" >> "$GITHUB_ENV"
          else
            echo "PIP_PLATFORM=manylinux_2_17_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline" >> "$GITHUB_ENV"
            echo "CLI_ARCH=amd64" >> "$GITHUB_ENV"
          fi

      - name: 通过 API 获取发行版中的文件名
        id: get_filename
        run: |
          API_URL="https://gitee.com/api/v5/repos/${{ inputs.gitee_repo }}/releases/tags/${{ inputs.plugin_version }}"
          echo "正在获取发行版信息: $API_URL"
          
          FILENAME=$(curl -s "$API_URL" | grep -oE '"name":"[^"]+\.difypkg"' | head -1 | sed 's/"name":"//' | sed 's/"//')
          
          if [ -z "$FILENAME" ]; then
            echo "❌ 未找到 .difypkg 文件"
            exit 1
          fi
          
          echo "找到文件: $FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: 从 Gitee 下载插件文件
        run: |
          DOWNLOAD_URL="https://gitee.com/${{ inputs.gitee_repo }}/releases/download/${{ inputs.plugin_version }}/${{ env.FILENAME }}"
          echo "下载地址: $DOWNLOAD_URL"
          
          curl -L -o "${{ env.FILENAME }}" "$DOWNLOAD_URL"
          
          if [ $? -ne 0 ] || [ ! -s "${{ env.FILENAME }}" ]; then
            echo "❌ 下载失败"
            exit 1
          fi
          
          echo "✅ 下载成功: ${{ env.FILENAME }}"

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 下载 dify-plugin CLI 工具
        run: |
          # 下载 dify-plugin 命令行工具
          CLI_VERSION="0.1.0"
          CLI_URL="https://github.com/langgenius/dify-plugin-daemon/releases/download/${CLI_VERSION}/dify-plugin-linux-${CLI_ARCH}"
          
          echo "正在下载 CLI 工具: $CLI_URL"
          curl -L -o dify-plugin "$CLI_URL"
          chmod +x dify-plugin
          
          # 移动到系统路径
          sudo mv dify-plugin /usr/local/bin/
          
          # 验证
          dify-plugin --version || echo "CLI 工具验证完成"

      - name: 下载打包脚本
        run: |
          curl -O https://raw.githubusercontent.com/junjiem/dify-plugin-repackaging/main/plugin_repackaging.sh
          chmod +x ./plugin_repackaging.sh

      - name: 执行重打包
        run: |
          PIP_MIRROR_URL=https://pypi.org/simple \
          ./plugin_repackaging.sh \
          -p ${{ env.PIP_PLATFORM }} \
          -s ${{ env.PACKAGE_SUFFIX }} \
          local \
          "${{ env.FILENAME }}"

      - name: 找到重打包后的文件
        run: |
          ARTIFACT_PATH=$(find . -type f -name "*-${PACKAGE_SUFFIX}.difypkg" | head -n 1)
          if [ -z "$ARTIFACT_PATH" ]; then
            echo "❌ 未找到重打包后的文件"
            exit 1
          fi
          
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")" >> $GITHUB_ENV
          echo "✅ 打包完成: $ARTIFACT_NAME"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
